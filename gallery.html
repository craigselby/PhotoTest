<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - CS Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Variables ─────────────────────────────────────────── */
:root{
  --bg:#0a0a0f;
  --bg2:#13131c;
  --gold:#c9a84c;
  --gold-l:#e8c96e;
  --white:#f0ede6;
  --muted:#888880;
  --border:rgba(201,168,76,0.15);
  --sidebar:270px;
  --gap:3px;         /* tight gap — Instagram feel */
  --cols:2;          /* mobile default: 2 columns */
}

/* ── Reset ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  font-weight:300;
  display:flex;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Image protection ──────────────────────────────────── */
.grid-item img,.lightbox-img{
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════════ */
.sidebar{
  width:var(--sidebar);
  min-width:var(--sidebar);
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  z-index:10;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.sidebar-brand{padding:2rem 1.5rem 1.5rem;border-bottom:1px solid var(--border)}
.brand-name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:400;
  color:var(--gold);letter-spacing:.05em;
  line-height:1.1;display:block;
  margin-bottom:.3rem;text-decoration:none;
}
.brand-sub{font-size:.62rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
.gold-rule{width:40px;height:1px;background:var(--gold);opacity:.4;margin:.8rem 0 0}
.nav-section{padding:1.4rem 1.5rem .4rem}
.nav-label{font-size:.6rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;display:block}
.nav-label.latest-label{color:var(--gold-l)}
.nav-link{
  display:block;font-size:.8rem;font-weight:300;
  color:var(--muted);padding:.32rem 0;
  transition:color .2s,padding-left .2s;
  cursor:pointer;background:none;border:none;
  text-align:left;width:100%;
  font-family:'Montserrat',sans-serif;
  line-height:1.4;text-decoration:none;
}
.nav-link:hover{color:var(--white);padding-left:.4rem}
.nav-link.active{color:var(--gold);padding-left:.4rem}
.nav-link.active::before{content:'- ';color:var(--gold)}
.nav-section.latest-section{border-bottom:1px solid var(--border);margin-bottom:.5rem;padding-bottom:1rem}
.nav-section.latest-section .nav-link{color:var(--white)}
.nav-section.latest-section .nav-link:hover{color:var(--gold)}
.sidebar-footer{margin-top:auto;padding:1.5rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.8rem}
.footer-link{font-size:.72rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);text-decoration:none;transition:color .2s}
.footer-link:hover{color:var(--white)}
.social-row{display:flex;gap:1rem}
.social-link{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.social-link:hover{color:var(--gold)}

/* ══════════════════════════════════════════════════════════
   MAIN CONTENT AREA
══════════════════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Topbar ──────────────────────────────────────────────── */
.topbar{
  padding:1.4rem 1.8rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:1rem;
}
.back-link{
  font-size:.65rem;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  transition:color .2s;white-space:nowrap;flex-shrink:0;
}
.back-link:hover{color:var(--gold)}
.topbar-divider{width:1px;height:1rem;background:var(--border);flex-shrink:0}
.topbar-intro{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(.85rem,1.3vw,1.05rem);
  font-weight:300;font-style:italic;
  color:var(--muted);line-height:1.5;
}
.topbar-intro strong{color:var(--white);font-style:normal;font-weight:400}

/* ── Filter bar ──────────────────────────────────────────── */
.filter-bar{
  padding:.75rem 1.8rem;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;
}
.filter-label{font-size:.6rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-right:.5rem}
.filter-btn{
  font-family:'Montserrat',sans-serif;
  font-size:.6rem;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);background:none;
  border:1px solid transparent;
  padding:.28rem .75rem;cursor:pointer;transition:all .2s;
}
.filter-btn:hover{color:var(--white);border-color:var(--border)}
.filter-btn.active{color:var(--bg);background:var(--gold);border-color:var(--gold)}

/* ── Gallery wrapper ─────────────────────────────────────── */
.gallery{padding:0;flex:1}

.gallery-header{
  display:flex;align-items:baseline;gap:1rem;
  padding:1rem 1.8rem .8rem;
}
.gallery-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;color:var(--white)}
.gallery-count{font-size:.62rem;font-weight:500;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}

/* ══════════════════════════════════════════════════════════
   SQUARE GRID — MOBILE FIRST
   Default: 2 columns, 3px gap
   ≥768px:  2 columns (same, more breathing room)
   ≥1024px: 3 columns
══════════════════════════════════════════════════════════ */
.grid{
  display:grid;
  grid-template-columns:repeat(var(--cols), 1fr);
  gap:var(--gap);
  padding:0 var(--gap) var(--gap);
}

@media(min-width:768px){
  :root{--gap:4px}
}
@media(min-width:1024px){
  :root{--cols:3;--gap:6px}
}

/* Square cells via aspect-ratio */
.grid-item{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  aspect-ratio:1/1;
  background:var(--bg2);
}
.grid-item img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  transition:transform .45s ease;
}
.grid-item:hover img{transform:scale(1.06)}

/* Hover overlay — desktop only (touch devices use tap) */
@media(hover:hover){
  .grid-item-overlay{
    position:absolute;inset:0;
    background:linear-gradient(to top,rgba(10,10,15,.88) 0%,transparent 55%);
    opacity:0;transition:opacity .3s;
    display:flex;flex-direction:column;
    justify-content:flex-end;padding:.8rem;
  }
  .grid-item:hover .grid-item-overlay{opacity:1}
  .overlay-title{
    font-family:'Cormorant Garamond',serif;
    font-size:.92rem;font-weight:400;
    color:var(--white);line-height:1.2;
  }
  .overlay-cat{
    font-size:.55rem;font-weight:500;
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold);margin-top:.2rem;
  }
}
/* On touch devices, keep overlay hidden — lightbox is the experience */
@media(hover:none){
  .grid-item-overlay{display:none}
}

/* ── Empty / loading states ──────────────────────────────── */
.state-msg{
  text-align:center;padding:5rem 2rem;
  font-family:'Cormorant Garamond',serif;
  font-size:1.3rem;font-style:italic;
  color:var(--muted);display:none;
}
.state-msg.visible{display:block}

/* ══════════════════════════════════════════════════════════
   LIGHTBOX
   Full-screen on mobile with swipe support
   Contained on desktop
══════════════════════════════════════════════════════════ */
.lightbox{
  display:none;
  position:fixed;inset:0;
  background:rgba(10,10,15,.97);
  z-index:100;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  /* Prevent body scroll-jump on iOS */
  overscroll-behavior:contain;
}
.lightbox.open{display:flex}

/* Close button — large tap target, top right */
.lightbox-close{
  position:absolute;top:0;right:0;
  width:3.5rem;height:3.5rem;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:.72rem;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;background:none;border:none;
  font-family:'Montserrat',sans-serif;transition:color .2s;
  z-index:10;
}
.lightbox-close:hover{color:var(--white)}

/* Image area */
.lightbox-img-wrap{
  width:100%;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:3.5rem 0 0;
}
.lightbox-img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
  border-radius:2px;
  /* Prevent iOS long-press menu */
  -webkit-touch-callout:none;
}

/* Caption */
.lightbox-caption{
  padding:.75rem 1.5rem 1.2rem;
  text-align:center;
  flex-shrink:0;
}
.lb-title{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--white)}
.lb-cat{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:.25rem}
.lb-counter{font-size:.58rem;letter-spacing:.1em;color:var(--muted);margin-top:.3rem}

/* Prev / Next buttons */
.lightbox-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(10,10,15,.6);
  border:1px solid var(--border);
  color:var(--muted);
  /* Large tap targets on mobile */
  width:2.8rem;height:4rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  transition:color .2s,border-color .2s,background .2s;
  z-index:10;
}
.lightbox-nav:hover{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.12)}
.lb-prev{left:.5rem;border-radius:0 3px 3px 0}
.lb-next{right:.5rem;border-radius:3px 0 0 3px}

/* On wider screens, move arrows outside image area */
@media(min-width:600px){
  .lightbox-img-wrap{padding:3.5rem 4rem 0}
  .lb-prev{left:0}
  .lb-next{right:0}
}

/* ══════════════════════════════════════════════════════════
   MOBILE MENU TOGGLE
══════════════════════════════════════════════════════════ */
.mobile-toggle{
  display:none;
  position:fixed;top:.85rem;left:.85rem;
  z-index:200;
  background:var(--bg2);
  border:1px solid var(--border);
  color:var(--gold);
  padding:.45rem .85rem;
  font-size:.65rem;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;
  cursor:pointer;font-family:'Montserrat',sans-serif;
}

/* ── Mobile overrides (≤ 750px) ──────────────────────────── */
@media(max-width:750px){
  .mobile-toggle{display:block}
  .sidebar{
    position:fixed;left:-100%;
    transition:left .3s ease;
    height:100vh;z-index:150;
  }
  .sidebar.open{left:0}
  /* Overlay behind open sidebar */
  .sidebar-backdrop{
    display:none;
    position:fixed;inset:0;
    background:rgba(10,10,15,.6);
    z-index:140;
  }
  .sidebar-backdrop.visible{display:block}
  /* Tighter padding on small screens */
  .topbar{padding:1rem 1rem 1rem 4rem}
  .filter-bar{padding:.65rem 1rem}
  .gallery-header{padding:.85rem 1rem .65rem}
  /* Full-screen lightbox on mobile */
  .lightbox-img-wrap{padding:3rem 0 0}
  .lightbox-img{border-radius:0}
}
</style>
</head>
<body>

<!-- Mobile sidebar toggle -->
<button class="mobile-toggle" id="menuToggle" onclick="toggleSidebar()">&#9776; Menu</button>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <a href="index.html" class="brand-name">Craig Selby</a>
    <span class="brand-sub">CS Photography</span>
    <div class="gold-rule"></div>
  </div>
  <nav id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="mailto:craig@craigselby.co.uk" class="footer-link">Contact</a>
    <div class="social-row">
      <a href="https://instagram.com/craigselby" class="social-link" target="_blank">Instagram</a>
      <a href="work-with-me.html" class="social-link">Work With Me</a>
    </div>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <a href="index.html" class="back-link">&#8249; Home</a>
    <div class="topbar-divider"></div>
    <p class="topbar-intro">If you are organising an event or seeking a photographer, <strong>I would be delighted to hear from you.</strong></p>
  </div>
  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="filterBy('all','all',this)">All</button>
  </div>
  <div class="gallery">
    <div class="gallery-header">
      <span class="gallery-title" id="galleryTitle">All Photos</span>
      <span class="gallery-count" id="galleryCount"></span>
    </div>
    <div class="grid" id="grid"></div>
    <p class="state-msg visible" id="loadingMsg">Loading gallery&#8230;</p>
    <p class="state-msg" id="emptyMsg">No images in this category yet.</p>
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose" aria-label="Close">&#10005;</button>
  <button class="lightbox-nav lb-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
  <button class="lightbox-nav lb-next" id="lbNext" aria-label="Next">&#8250;</button>
  <div class="lightbox-img-wrap" id="lbImgWrap">
    <img src="" alt="" class="lightbox-img" id="lbImg">
  </div>
  <div class="lightbox-caption">
    <p class="lb-title" id="lbTitle"></p>
    <p class="lb-cat" id="lbCat"></p>
    <p class="lb-counter" id="lbCounter"></p>
  </div>
</div>

<script>
/* ── State ───────────────────────────────────────────────── */
var allImgs = [];
var visible = [];
var lbIdx = 0;

/* ── URL helpers ─────────────────────────────────────────── */
function getParam(k){ return new URLSearchParams(window.location.search).get(k); }

/* ══════════════════════════════════════════════════════════
   LOAD & INITIALISE
══════════════════════════════════════════════════════════ */
async function load(){
  try{
    var r = await fetch('images.json?v=' + Date.now());
    var data = await r.json();
    allImgs = data.images || [];
    var cat = getParam('cat');
    var grp = getParam('group');
    buildNav(data.groups || []);
    if(cat){
      document.getElementById('filterBar').style.display = 'none';
      var navBtn = document.querySelector('[data-cat="' + cat + '"]');
      filterBy('category', cat, navBtn);
    } else {
      buildFilterBar(data.groups || []);
      if(grp){
        var grpBtn = document.querySelector('[data-grp="' + grp + '"]');
        filterBy('group', grp, grpBtn);
      } else {
        filterBy('all', 'all', document.querySelector('.filter-btn'));
      }
    }
  } catch(e){
    document.getElementById('loadingMsg').textContent = 'Gallery unavailable.';
  } finally {
    document.getElementById('loadingMsg').classList.remove('visible');
  }
}

/* ── Build sidebar nav ───────────────────────────────────── */
function buildNav(groups){
  var nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  groups.forEach(function(g){
    var sec = document.createElement('div');
    sec.className = 'nav-section' + (g.slug === 'latest' ? ' latest-section' : '');
    var lbl = document.createElement('span');
    lbl.className = 'nav-label' + (g.slug === 'latest' ? ' latest-label' : '');
    lbl.textContent = g.label;
    sec.appendChild(lbl);
    g.categories.forEach(function(c){
      var btn = document.createElement('button');
      btn.className = 'nav-link';
      btn.textContent = c.label;
      btn.dataset.cat = c.slug;
      btn.onclick = function(){
        document.getElementById('filterBar').style.display = 'none';
        filterBy('category', c.slug, btn);
        history.replaceState(null, '', '?cat=' + c.slug);
        closeSidebar();
      };
      sec.appendChild(btn);
    });
    nav.appendChild(sec);
  });
}

/* ── Build filter bar ────────────────────────────────────── */
function buildFilterBar(groups){
  var bar = document.getElementById('filterBar');
  bar.querySelectorAll('.filter-btn:not(:first-of-type)').forEach(function(b){ b.remove(); });
  groups.forEach(function(g){
    var btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = g.label;
    btn.dataset.grp = g.slug;
    btn.onclick = function(){
      document.getElementById('filterBar').style.display = '';
      filterBy('group', g.slug, btn);
      history.replaceState(null, '', '?group=' + g.slug);
    };
    bar.appendChild(btn);
  });
}

/* ── Filter + render ─────────────────────────────────────── */
function filterBy(type, val, btn){
  document.querySelectorAll('.nav-link').forEach(function(l){ l.classList.remove('active'); });
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  if(btn) btn.classList.add('active');
  render(type, val);
}

function render(type, val){
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  visible = allImgs.filter(function(i){
    if(type === 'all') return true;
    if(type === 'group') return i.group === val;
    if(type === 'category') return i.category === val;
    return true;
  });
  document.getElementById('emptyMsg').classList.toggle('visible', visible.length === 0);
  document.getElementById('galleryCount').textContent = visible.length > 0 ? visible.length + ' photos' : '';
  var ttl = document.getElementById('galleryTitle');
  if(type === 'all') ttl.textContent = 'All Photos';
  else if(type === 'group') ttl.textContent = val === 'latest' ? 'Latest Work' : val.charAt(0).toUpperCase() + val.slice(1);
  else ttl.textContent = visible[0] ? visible[0].categoryLabel : val;

  visible.forEach(function(img, idx){
    var item = document.createElement('div');
    item.className = 'grid-item';
    item.setAttribute('role', 'button');
    item.setAttribute('tabindex', '0');
    item.onclick = function(){ openLb(idx); };
    item.onkeydown = function(e){ if(e.key === 'Enter' || e.key === ' ') openLb(idx); };

    var im = document.createElement('img');
    im.src = img.src;
    im.alt = img.title;
    im.loading = 'lazy';
    /* Let browser choose focal point; can be overridden per-image if needed */
    im.style.objectPosition = 'center top';

    var ov = document.createElement('div');
    ov.className = 'grid-item-overlay';
    ov.innerHTML = '<span class="overlay-title">' + img.title + '</span><span class="overlay-cat">' + img.categoryLabel + '</span>';

    item.appendChild(im);
    item.appendChild(ov);
    grid.appendChild(item);
  });
}

/* ══════════════════════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════════════════════ */
function openLb(idx){
  lbIdx = idx;
  updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateLb(){
  var img = visible[lbIdx];
  var el = document.getElementById('lbImg');
  el.src = img.src;
  el.alt = img.title;
  document.getElementById('lbTitle').textContent = img.title;
  document.getElementById('lbCat').textContent = img.categoryLabel;
  document.getElementById('lbCounter').textContent = (lbIdx + 1) + ' / ' + visible.length;
}

function lbNav(dir){
  lbIdx = (lbIdx + dir + visible.length) % visible.length;
  updateLb();
}

function closeLb(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

/* Click outside image to close */
document.getElementById('lightbox').addEventListener('click', function(e){
  if(e.target === this || e.target === document.getElementById('lbImgWrap')) closeLb();
});
document.getElementById('lbClose').addEventListener('click', closeLb);
document.getElementById('lbPrev').addEventListener('click', function(){ lbNav(-1); });
document.getElementById('lbNext').addEventListener('click', function(){ lbNav(1); });

/* ── Touch/swipe support for lightbox ────────────────────── */
var touchStartX = 0;
var touchStartY = 0;
var touchDeltaX = 0;

document.getElementById('lightbox').addEventListener('touchstart', function(e){
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchDeltaX = 0;
}, {passive: true});

document.getElementById('lightbox').addEventListener('touchmove', function(e){
  touchDeltaX = e.touches[0].clientX - touchStartX;
}, {passive: true});

document.getElementById('lightbox').addEventListener('touchend', function(e){
  var deltaY = e.changedTouches[0].clientY - touchStartY;
  /* Horizontal swipe: must be more horizontal than vertical, >40px */
  if(Math.abs(touchDeltaX) > Math.abs(deltaY) && Math.abs(touchDeltaX) > 40){
    lbNav(touchDeltaX < 0 ? 1 : -1);
  }
  /* Swipe down to close */
  if(deltaY > 80 && Math.abs(touchDeltaX) < 40){
    closeLb();
  }
}, {passive: true});

/* ── Sidebar ─────────────────────────────────────────────── */
function toggleSidebar(){
  var open = document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('visible', open);
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('visible');
}

/* ── Keyboard ────────────────────────────────────────────── */
document.addEventListener('keydown', function(e){
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key === 'Escape') closeLb();
  if(e.key === 'ArrowRight') lbNav(1);
  if(e.key === 'ArrowLeft') lbNav(-1);
});

/* ── Protection ──────────────────────────────────────────── */
document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
document.addEventListener('dragstart', function(e){ e.preventDefault(); });

load();
