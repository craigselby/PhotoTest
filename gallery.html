<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - CS Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#13131c;--gold:#c9a84c;--white:#f0ede6;--muted:#888880;--border:rgba(201,168,76,0.15);--sidebar:270px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;display:flex;min-height:100vh;overflow-x:hidden}
.grid-item img,.lightbox-inner img{pointer-events:none;user-select:none;-webkit-user-drag:none}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar-brand{padding:2rem 1.5rem 1.5rem;border-bottom:1px solid var(--border)}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;color:var(--gold);letter-spacing:.05em;line-height:1.1;display:block;margin-bottom:.3rem;text-decoration:none}
.brand-sub{font-size:.62rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
.gold-rule{width:40px;height:1px;background:var(--gold);opacity:.4;margin:.8rem 0 0}
.nav-section{padding:1.4rem 1.5rem .4rem}
.nav-label{font-size:.6rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;display:block}
.nav-link{display:block;font-size:.8rem;font-weight:300;color:var(--muted);padding:.32rem 0;transition:color .2s,padding-left .2s;cursor:pointer;background:none;border:none;text-align:left;width:100%;font-family:'Montserrat',sans-serif;line-height:1.4;text-decoration:none}
.nav-link:hover{color:var(--white);padding-left:.4rem}
.nav-link.active{color:var(--gold);padding-left:.4rem}
.nav-link.active::before{content:'- ';color:var(--gold)}
.sidebar-footer{margin-top:auto;padding:1.5rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.8rem}
.footer-link{font-size:.72rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);text-decoration:none;transition:color .2s}
.footer-link:hover{color:var(--white)}
.social-row{display:flex;gap:1rem}
.social-link{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.social-link:hover{color:var(--gold)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:1.8rem 2.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem}
.back-link{font-size:.65rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;white-space:nowrap;flex-shrink:0}
.back-link:hover{color:var(--gold)}
.topbar-divider{width:1px;height:1rem;background:var(--border);flex-shrink:0}
.topbar-intro{font-family:'Cormorant Garamond',serif;font-size:clamp(.9rem,1.4vw,1.1rem);font-weight:300;font-style:italic;color:var(--muted);line-height:1.5}
.topbar-intro strong{color:var(--white);font-style:normal;font-weight:400}
.filter-bar{padding:.9rem 2.5rem;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.filter-label{font-size:.6rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-right:.5rem}
.filter-btn{font-family:'Montserrat',sans-serif;font-size:.62rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid transparent;padding:.32rem .85rem;cursor:pointer;transition:all .2s}
.filter-btn:hover{color:var(--white);border-color:var(--border)}
.filter-btn.active{color:var(--bg);background:var(--gold);border-color:var(--gold)}
.gallery{padding:2rem 2.5rem;flex:1}
.gallery-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem}
.gallery-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;color:var(--white)}
.gallery-count{font-size:.65rem;font-weight:500;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.grid{columns:3;column-gap:10px}
@media(max-width:1200px){.grid{columns:2}}
@media(max-width:700px){.grid{columns:1}}
.grid-item{break-inside:avoid;margin-bottom:10px;position:relative;overflow:hidden;border-radius:5px;cursor:pointer}
.grid-item img{width:100%;display:block;border-radius:5px;transition:transform .4s ease}
.grid-item:hover img{transform:scale(1.04)}
.grid-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,15,.88) 0%,transparent 55%);opacity:0;transition:opacity .3s;border-radius:5px;display:flex;flex-direction:column;justify-content:flex-end;padding:1rem}
.grid-item:hover .grid-item-overlay{opacity:1}
.overlay-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:400;color:var(--white);line-height:1.2}
.overlay-cat{font-size:.58rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:.25rem}
.state-msg{text-align:center;padding:5rem 2rem;font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;color:var(--muted);display:none}
.state-msg.visible{display:block}
.lightbox{display:none;position:fixed;inset:0;background:rgba(10,10,15,.96);z-index:100;align-items:center;justify-content:center;padding:2rem}
.lightbox.open{display:flex}
.lightbox-inner{max-width:90vw;max-height:90vh;position:relative;display:flex;flex-direction:column;align-items:center}
.lightbox-inner img{max-width:100%;max-height:82vh;object-fit:contain;border-radius:4px}
.lightbox-close{position:absolute;top:-2.5rem;right:0;color:var(--muted);font-size:.72rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;transition:color .2s}
.lightbox-close:hover{color:var(--white)}
.lightbox-caption{margin-top:1rem;text-align:center}
.lb-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--white)}
.lb-cat{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:.3rem}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--border);color:var(--muted);font-size:1.2rem;width:2.5rem;height:2.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s,border-color .2s}
.lightbox-nav:hover{color:var(--gold);border-color:var(--gold)}
.lb-prev{left:-3.5rem}
.lb-next{right:-3.5rem}
.mobile-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:200;background:var(--bg2);border:1px solid var(--border);color:var(--gold);padding:.5rem .9rem;font-size:.65rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif}
@media(max-width:750px){.mobile-toggle{display:block}.sidebar{position:fixed;left:-100%;transition:left .3s ease;height:100vh;z-index:150}.sidebar.open{left:0}.topbar,.filter-bar,.gallery{padding-left:1.2rem;padding-right:1.2rem}.lb-prev{left:-0.5rem}.lb-next{right:-0.5rem}}
</style>
</head>
<body>
<button class="mobile-toggle" onclick="toggleSidebar()">&#9776; Menu</button>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <a href="index.html" class="brand-name">Craig Selby</a>
    <span class="brand-sub">CS Photography</span>
    <div class="gold-rule"></div>
  </div>
  <nav id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="mailto:craig@craigselby.co.uk" class="footer-link">Contact</a>
    <div class="social-row">
      <a href="https://instagram.com/craigselby" class="social-link" target="_blank">Instagram</a>
      <a href="work-with-me.html" class="social-link">Work With Me</a>
    </div>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <a href="index.html" class="back-link">&#8249; Home</a>
    <div class="topbar-divider"></div>
    <p class="topbar-intro">If you are organising an event or seeking a photographer, <strong>I would be delighted to hear from you.</strong></p>
  </div>
  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="filterBy('all','all',this)">All</button>
  </div>
  <div class="gallery">
    <div class="gallery-header">
      <span class="gallery-title" id="galleryTitle">All Photos</span>
      <span class="gallery-count" id="galleryCount"></span>
    </div>
    <div class="grid" id="grid"></div>
    <p class="state-msg visible" id="loadingMsg">Loading gallery...</p>
    <p class="state-msg" id="emptyMsg">No images in this category yet.</p>
  </div>
</main>
<div class="lightbox" id="lightbox" onclick="lbBgClick(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLb()">&#10005; Close</button>
    <button class="lightbox-nav lb-prev" onclick="lbNav(-1)">&#8249;</button>
    <button class="lightbox-nav lb-next" onclick="lbNav(1)">&#8250;</button>
    <img src="" alt="" id="lbImg">
    <div class="lightbox-caption">
      <p class="lb-title" id="lbTitle"></p>
      <p class="lb-cat" id="lbCat"></p>
    </div>
  </div>
</div>
<script>
var allImgs=[];
var visible=[];
var lbIdx=0;

function getParam(k){
  return new URLSearchParams(window.location.search).get(k);
}

async function load(){
  try{
    var r=await fetch('images.json?v='+Date.now());
    var data=await r.json();
    allImgs=data.images||[];
    var cat=getParam('cat');
    var grp=getParam('group');
    buildNav(data.groups||[]);
    if(cat){
      document.getElementById('filterBar').style.display='none';
      buildNav(data.groups||[]);
      var navBtn=document.querySelector('[data-cat="'+cat+'"]');
      filterBy('category',cat,navBtn);
    } else {
      buildFilterBar(data.groups||[]);
      if(grp){
        var grpBtn=document.querySelector('[data-grp="'+grp+'"]');
        filterBy('group',grp,grpBtn);
      } else {
        filterBy('all','all',document.querySelector('.filter-btn'));
      }
    }
  }catch(e){
    document.getElementById('loadingMsg').textContent='Gallery unavailable.';
  } finally {
    document.getElementById('loadingMsg').classList.remove('visible');
  }
}

function buildNav(groups){
  var nav=document.getElementById('sidebarNav');
  nav.innerHTML='';
  groups.forEach(function(g){
    var sec=document.createElement('div');
    sec.className='nav-section';
    var lbl=document.createElement('span');
    lbl.className='nav-label';
    lbl.textContent=g.label;
    sec.appendChild(lbl);
    g.categories.forEach(function(c){
      var btn=document.createElement('button');
      btn.className='nav-link';
      btn.textContent=c.label;
      btn.dataset.cat=c.slug;
      btn.onclick=function(){
        document.getElementById('filterBar').style.display='none';
        filterBy('category',c.slug,btn);
        history.replaceState(null,'','?cat='+c.slug);
        if(window.innerWidth<=750) document.getElementById('sidebar').classList.remove('open');
      };
      sec.appendChild(btn);
    });
    nav.appendChild(sec);
  });
}

function buildFilterBar(groups){
  var bar=document.getElementById('filterBar');
  bar.querySelectorAll('.filter-btn:not(:first-of-type)').forEach(function(b){b.remove();});
  groups.forEach(function(g){
    var btn=document.createElement('button');
    btn.className='filter-btn';
    btn.textContent=g.label;
    btn.dataset.grp=g.slug;
    btn.onclick=function(){
      document.getElementById('filterBar').style.display='';
      filterBy('group',g.slug,btn);
      history.replaceState(null,'','?group='+g.slug);
    };
    bar.appendChild(btn);
  });
}

function filterBy(type,val,btn){
  document.querySelectorAll('.nav-link').forEach(function(l){l.classList.remove('active');});
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  render(type,val);
}

function render(type,val){
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  visible=allImgs.filter(function(i){
    if(type==='all') return true;
    if(type==='group') return i.group===val;
    if(type==='category') return i.category===val;
    return true;
  });
  document.getElementById('emptyMsg').classList.toggle('visible',visible.length===0);
  document.getElementById('galleryCount').textContent=visible.length>0?visible.length+' photos':'';
  var ttl=document.getElementById('galleryTitle');
  if(type==='all') ttl.textContent='All Photos';
  else if(type==='group') ttl.textContent=val.charAt(0).toUpperCase()+val.slice(1);
  else ttl.textContent=visible[0]?visible[0].categoryLabel:val;
  visible.forEach(function(img,idx){
    var item=document.createElement('div');
    item.className='grid-item';
    item.onclick=function(){openLb(idx);};
    var im=document.createElement('img');
    im.src=img.src;im.alt=img.title;im.loading='lazy';
    var ov=document.createElement('div');
    ov.className='grid-item-overlay';
    ov.innerHTML='<span class="overlay-title">'+img.title+'</span><span class="overlay-cat">'+img.categoryLabel+'</span>';
    item.appendChild(im);item.appendChild(ov);grid.appendChild(item);
  });
}

function openLb(idx){
  lbIdx=idx;updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function updateLb(){
  var img=visible[lbIdx];
  document.getElementById('lbImg').src=img.src;
  document.getElementById('lbImg').alt=img.title;
  document.getElementById('lbTitle').textContent=img.title;
  document.getElementById('lbCat').textContent=img.categoryLabel;
}
function lbNav(dir){lbIdx=(lbIdx+dir+visible.length)%visible.length;updateLb();}
function closeLb(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
function lbBgClick(e){if(e.target===document.getElementById('lightbox')) closeLb();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

document.addEventListener('contextmenu',function(e){e.preventDefault();});
document.addEventListener('dragstart',function(e){e.preventDefault();});
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowRight') lbNav(1);
  if(e.key==='ArrowLeft') lbNav(-1);
});

load();
</script>
</body>
</html>
