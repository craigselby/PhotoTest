name: Update Gallery Manifest

on:
  push:
    paths:
      - 'images/**'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install Pillow --quiet

      - name: Generate image manifest
        run: |
          python3 << 'EOF'
          import os, json, re

          IMAGE_EXTENSIONS = {'.jpg', '.jpeg', '.png', '.webp'}
          GROUPS = ['latest', 'general', 'music', 'sports']

          def slugify(name):
              return name.lower().replace(' ', '-').replace('_', '-')

          def labelify(slug):
              overrides = {
                  'm2m': 'Metal 2 The Masses -',
                  'ffltech': 'FFLtech',
                  'gv70': 'gv70',
                  'ngpw': 'NGPW',
              }
              words = slug.replace('-', ' ').replace('_', ' ').split()
              result = []
              for word in words:
                  low = word.lower()
                  result.append(overrides[low] if low in overrides else word.capitalize())
              return ' '.join(result)

          def extract_keywords(filepath):
              keywords = []
              try:
                  with open(filepath, 'rb') as f:
                      data = f.read()
                  xmp_start = data.find(b'<x:xmpmeta')
                  xmp_end = data.find(b'</x:xmpmeta>')
                  if xmp_start != -1 and xmp_end != -1:
                      xmp = data[xmp_start:xmp_end + 12].decode('utf-8', errors='ignore')
                      subjects = re.findall(r'<rdf:li[^>]*>([^<]+)</rdf:li>', xmp)
                      keywords = [s.strip().lower() for s in subjects if s.strip()]
              except Exception as e:
                  print(f'  Warning: could not read metadata from {filepath}: {e}')
              return keywords

          manifest = {'groups': [], 'images': []}
          images_root = 'images'

          if not os.path.exists(images_root):
              print('No images folder found')
              with open('images.json', 'w') as f:
                  json.dump(manifest, f, indent=2)
              exit()

          featured_count = 0
          total_count = 0

          for group in GROUPS:
              group_path = os.path.join(images_root, group)
              if not os.path.isdir(group_path):
                  continue
              categories = []
              for category in sorted(os.listdir(group_path)):
                  cat_path = os.path.join(group_path, category)
                  if not os.path.isdir(cat_path):
                      continue
                  image_files = [f for f in sorted(os.listdir(cat_path))
                                 if os.path.splitext(f)[1].lower() in IMAGE_EXTENSIONS]
                  if not image_files:
                      continue
                  cat_slug = slugify(category)
                  cat_label = labelify(category)
                  categories.append({'slug': cat_slug, 'label': cat_label})
                  for fname in image_files:
                      fpath = os.path.join(cat_path, fname)
                      keywords = extract_keywords(fpath)
                      featured = 'featured' in keywords
                      title = os.path.splitext(fname)[0].replace('-', ' ').replace('_', ' ').title()
                      manifest['images'].append({
                          'src': f'images/{group}/{category}/{fname}',
                          'title': title,
                          'category': cat_slug,
                          'group': group,
                          'categoryLabel': cat_label,
                          'featured': featured
                      })
                      total_count += 1
                      if featured:
                          featured_count += 1
                          print(f'  [FEATURED] {fname}')
              if categories:
                  group_label = 'Latest Work' if group == 'latest' else group.capitalize()
                  manifest['groups'].append({
                      'slug': group,
                      'label': group_label,
                      'categories': categories
                  })

          with open('images.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          print(f'Done: {total_count} images, {featured_count} featured')
          EOF

      - name: Commit manifest
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add images.json
          git diff --staged --quiet || git commit -m "Auto-update gallery manifest [skip ci]"
          git push
