<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craig Selby — CS Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0a0a0f;
    --bg2:    #13131c;
    --gold:   #c9a84c;
    --gold-l: #e8c96e;
    --white:  #f0ede6;
    --muted:  #888880;
    --border: rgba(201,168,76,0.15);
    --sidebar: 270px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  img {
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar);
    min-width: var(--sidebar);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 10;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-brand {
    padding: 2rem 1.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.1;
    display: block;
    margin-bottom: 0.3rem;
  }

  .brand-sub {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .gold-rule {
    width: 40px; height: 1px;
    background: var(--gold);
    opacity: 0.4;
    margin: 0.8rem 0 0;
  }

  .nav-section { padding: 1.4rem 1.5rem 0.4rem; }

  .nav-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
    display: block;
  }

  .nav-link {
    display: block;
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--muted);
    padding: 0.32rem 0;
    transition: color 0.2s, padding-left 0.2s;
    cursor: pointer;
    background: none;
    border: none;
    text-align: left;
    width: 100%;
    font-family: 'Montserrat', sans-serif;
    line-height: 1.4;
    text-decoration: none;
  }

  .nav-link:hover { color: var(--white); padding-left: 0.4rem; }

  .sidebar-footer {
    margin-top: auto;
    padding: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .footer-link {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-link:hover { color: var(--white); }

  .social-row { display: flex; gap: 1rem; }

  .social-link {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .social-link:hover { color: var(--gold); }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow-y: auto; }

  /* ── SLIDESHOW ── */
  .slideshow {
    position: relative;
    width: 100%;
    height: 80vh;
    min-height: 400px;
    overflow: hidden;
    background: var(--bg);
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .slide.active { opacity: 1; }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .slide-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to top, rgba(10,10,15,0.75) 0%, rgba(10,10,15,0.1) 50%, transparent 100%),
      linear-gradient(to right, rgba(10,10,15,0.4) 0%, transparent 60%);
  }

  .slide-content {
    position: absolute;
    bottom: 3.5rem;
    left: 3rem;
    z-index: 2;
  }

  .slide-eyebrow {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.8rem;
    display: block;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s 0.3s ease, transform 0.6s 0.3s ease;
  }

  .slide.active .slide-eyebrow {
    opacity: 1;
    transform: translateY(0);
  }

  .slide-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 300;
    line-height: 1.0;
    color: var(--white);
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.7s 0.5s ease, transform 0.7s 0.5s ease;
  }

  .slide.active .slide-title {
    opacity: 1;
    transform: translateY(0);
  }

  .slide-sub {
    font-size: 0.78rem;
    font-weight: 300;
    color: rgba(240,237,230,0.7);
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s 0.7s ease, transform 0.6s 0.7s ease;
  }

  .slide.active .slide-sub {
    opacity: 1;
    transform: translateY(0);
  }

  /* slideshow controls */
  .slide-controls {
    position: absolute;
    bottom: 3.5rem;
    right: 2.5rem;
    display: flex;
    gap: 0.5rem;
    z-index: 3;
  }

  .slide-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(240,237,230,0.3);
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
    border: none;
    padding: 0;
  }

  .slide-dot.active {
    background: var(--gold);
    transform: scale(1.3);
  }

  .slide-prev, .slide-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(10,10,15,0.4);
    border: 1px solid var(--border);
    color: var(--white);
    width: 2.8rem;
    height: 2.8rem;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    transition: background 0.2s, border-color 0.2s;
  }

  .slide-prev:hover, .slide-next:hover {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
  }

  .slide-prev { left: 1.5rem; }
  .slide-next { right: 1.5rem; }

  .slide-count {
    position: absolute;
    top: 1.5rem;
    right: 2rem;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: rgba(240,237,230,0.5);
    z-index: 3;
  }

  /* no featured fallback */
  .slideshow-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
  }

  .slideshow-placeholder h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    font-weight: 300;
    color: var(--white);
    text-align: center;
    line-height: 1.0;
  }

  .slideshow-placeholder p {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── INTRO STRIP ── */
  .intro-strip {
    padding: 2rem 3rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .intro-strip p {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.95rem, 1.5vw, 1.1rem);
    font-style: italic;
    color: var(--muted);
    max-width: 65ch;
    line-height: 1.65;
  }

  .intro-strip p strong {
    color: var(--white);
    font-style: normal;
    font-weight: 400;
  }

  .intro-cta {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--gold);
    padding: 0.8rem 1.8rem;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .intro-cta:hover { background: var(--gold-l); }

  /* ── CATEGORY CARDS ── */
  .categories-section {
    padding: 3rem;
    flex: 1;
  }

  .section-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.6rem;
    display: block;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 300;
    margin-bottom: 2rem;
    color: var(--white);
    line-height: 1.2;
  }

  .groups-wrapper {
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
  }

  .group-block {}

  .group-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .cat-card {
    background: var(--bg2);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    display: block;
    aspect-ratio: 4/3;
    transition: background 0.3s;
  }

  .cat-card:hover { background: #16161f; }

  .cat-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.6;
    transition: opacity 0.4s, transform 0.4s;
  }

  .cat-card:hover img {
    opacity: 0.8;
    transform: scale(1.05);
  }

  .cat-card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,15,0.85) 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 1.2rem;
  }

  .cat-card-label {
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }

  .cat-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--white);
    line-height: 1.2;
  }

  .cat-card-count {
    font-size: 0.62rem;
    color: rgba(240,237,230,0.5);
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
  }

  /* cat card with no image */
  .cat-card.no-img {
    aspect-ratio: 4/3;
    display: flex;
    align-items: flex-end;
    padding: 1.2rem;
  }

  .cat-card.no-img .cat-card-overlay {
    background: none;
    position: relative;
    inset: auto;
  }

  /* ── LOADING ── */
  .loading-msg {
    text-align: center;
    padding: 5rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    color: var(--muted);
  }

  /* ── MOBILE ── */
  .mobile-toggle {
    display: none;
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 200;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 0.5rem 0.9rem;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
  }

  @media (max-width: 900px) {
    .categories-section { padding: 2rem 1.5rem; }
    .intro-strip { padding: 1.5rem; }
  }

  @media (max-width: 750px) {
    .mobile-toggle { display: block; }
    .sidebar { position: fixed; left: -100%; transition: left 0.3s ease; height: 100vh; z-index: 150; }
    .sidebar.open { left: 0; }
    .slide-content { left: 1.5rem; bottom: 2.5rem; }
    .slide-prev { left: 0.5rem; }
    .slide-next { right: 0.5rem; }
    .intro-strip { flex-direction: column; align-items: flex-start; }
    .intro-cta { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<button class="mobile-toggle" onclick="toggleSidebar()">&#9776; Menu</button>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-name">Craig Selby</span>
    <span class="brand-sub">CS Photography</span>
    <div class="gold-rule"></div>
  </div>
  <nav id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="mailto:hello@craigselby.co.uk" class="footer-link">Contact</a>
    <div class="social-row">
      <a href="https://instagram.com/craigselby" class="social-link" target="_blank">Instagram</a>
      <a href="work-with-me.html" class="social-link">Work With Me</a>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- SLIDESHOW -->
  <div class="slideshow" id="slideshow">
    <div class="loading-msg" id="slideshowLoading">Loading...</div>
    <div class="slide-count" id="slideCount"></div>
    <button class="slide-prev" onclick="slideNav(-1)">&#8249;</button>
    <button class="slide-next" onclick="slideNav(1)">&#8250;</button>
    <div class="slide-controls" id="slideDots"></div>
  </div>

  <!-- INTRO -->
  <div class="intro-strip">
    <p>
      Live music, wildlife, landscapes and sports photography from South Wales.
      <strong>Available for events, venues and collaborations.</strong>
    </p>
    <a href="work-with-me.html" class="intro-cta">Work With Me</a>
  </div>

  <!-- CATEGORIES -->
  <div class="categories-section" id="categoriesSection">
    <div class="loading-msg" id="catsLoading">Loading galleries...</div>
  </div>

</main>

<script>
  var manifest = { groups: [], images: [] };
  var slides = [];
  var currentSlide = 0;
  var slideTimer = null;

  // ── LOAD ──
  async function init() {
    try {
      var res = await fetch('images.json?v=' + Date.now());
      manifest = await res.json();
      manifest.images = manifest.images || [];
      manifest.groups = manifest.groups || [];
    } catch(e) {
      document.getElementById('slideshowLoading').textContent = 'Gallery unavailable.';
      document.getElementById('catsLoading').textContent = '';
      return;
    }
    buildNav();
    buildSlideshow();
    buildCategories();
  }

  // ── SIDEBAR NAV ──
  function buildNav() {
    var nav = document.getElementById('sidebarNav');
    nav.innerHTML = '';
    manifest.groups.forEach(function(group) {
      var section = document.createElement('div');
      section.className = 'nav-section';
      var label = document.createElement('span');
      label.className = 'nav-label';
      label.textContent = group.label;
      section.appendChild(label);
      group.categories.forEach(function(cat) {
        var a = document.createElement('a');
        a.className = 'nav-link';
        a.textContent = cat.label;
        a.href = 'gallery.html?cat=' + cat.slug;
        section.appendChild(a);
      });
      nav.appendChild(section);
    });
  }

  // ── SLIDESHOW ──
  function buildSlideshow() {
    var ss = document.getElementById('slideshow');
    document.getElementById('slideshowLoading').remove();

    slides = manifest.images.filter(function(img) { return img.featured; });

    if (slides.length === 0) {
      ss.innerHTML = '<div class="slideshow-placeholder"><h1>Craig Selby</h1><p>CS Photography &nbsp;&middot;&nbsp; Port Talbot, Wales</p></div>';
      return;
    }

    // build slides
    slides.forEach(function(img, idx) {
      var div = document.createElement('div');
      div.className = 'slide' + (idx === 0 ? ' active' : '');

      var image = document.createElement('img');
      image.src = img.src;
      image.alt = img.title;
      if (idx > 0) image.loading = 'lazy';

      var overlay = document.createElement('div');
      overlay.className = 'slide-overlay';

      var content = document.createElement('div');
      content.className = 'slide-content';
      content.innerHTML =
        '<span class="slide-eyebrow">' + img.categoryLabel + '</span>' +
        '<div class="slide-title">Craig Selby</div>' +
        '<div class="slide-sub">' + img.title + '</div>';

      div.appendChild(image);
      div.appendChild(overlay);
      div.appendChild(content);
      ss.insertBefore(div, ss.querySelector('.slide-count'));
    });

    // dots
    var dots = document.getElementById('slideDots');
    slides.forEach(function(_, idx) {
      var dot = document.createElement('button');
      dot.className = 'slide-dot' + (idx === 0 ? ' active' : '');
      dot.onclick = function() { goToSlide(idx); };
      dots.appendChild(dot);
    });

    updateSlideCount();
    startTimer();
  }

  function goToSlide(idx) {
    var allSlides = document.querySelectorAll('.slide');
    var allDots = document.querySelectorAll('.slide-dot');
    allSlides[currentSlide].classList.remove('active');
    if (allDots[currentSlide]) allDots[currentSlide].classList.remove('active');
    currentSlide = (idx + slides.length) % slides.length;
    allSlides[currentSlide].classList.add('active');
    if (allDots[currentSlide]) allDots[currentSlide].classList.add('active');
    updateSlideCount();
    resetTimer();
  }

  function slideNav(dir) { goToSlide(currentSlide + dir); }

  function updateSlideCount() {
    var el = document.getElementById('slideCount');
    if (el && slides.length > 1) {
      el.textContent = (currentSlide + 1) + ' / ' + slides.length;
    }
  }

  function startTimer() {
    if (slides.length <= 1) return;
    slideTimer = setInterval(function() { goToSlide(currentSlide + 1); }, 5000);
  }

  function resetTimer() {
    clearInterval(slideTimer);
    startTimer();
  }

  // ── CATEGORY CARDS ──
  function buildCategories() {
    var section = document.getElementById('categoriesSection');
    section.innerHTML = '';

    if (manifest.groups.length === 0) {
      section.innerHTML = '<p style="color:var(--muted);font-style:italic;text-align:center;padding:3rem">No galleries yet — upload your first images to get started.</p>';
      return;
    }

    var labelEl = document.createElement('span');
    labelEl.className = 'section-label';
    labelEl.textContent = 'Browse the work';
    section.appendChild(labelEl);

    var titleEl = document.createElement('h2');
    titleEl.className = 'section-title';
    titleEl.textContent = 'Explore the galleries';
    section.appendChild(titleEl);

    var wrapper = document.createElement('div');
    wrapper.className = 'groups-wrapper';

    manifest.groups.forEach(function(group) {
      var block = document.createElement('div');
      block.className = 'group-block';

      var groupLabel = document.createElement('div');
      groupLabel.className = 'group-label';
      groupLabel.textContent = group.label;
      block.appendChild(groupLabel);

      var grid = document.createElement('div');
      grid.className = 'cat-grid';

      group.categories.forEach(function(cat) {
        var catImages = manifest.images.filter(function(img) {
          return img.category === cat.slug;
        });
        var count = catImages.length;

        // pick cover image — use featured if available, else first
        var cover = catImages.find(function(img) { return img.featured; }) || catImages[0];

        var a = document.createElement('a');
        a.className = 'cat-card' + (cover ? '' : ' no-img');
        a.href = 'gallery.html?cat=' + cat.slug;

        if (cover) {
          var img = document.createElement('img');
          img.src = cover.src;
          img.alt = cat.label;
          img.loading = 'lazy';
          a.appendChild(img);
        }

        var overlay = document.createElement('div');
        overlay.className = 'cat-card-overlay';
        overlay.innerHTML =
          '<span class="cat-card-label">' + group.label + '</span>' +
          '<span class="cat-card-title">' + cat.label + '</span>' +
          '<span class="cat-card-count">' + count + ' photo' + (count !== 1 ? 's' : '') + '</span>';

        a.appendChild(overlay);
        grid.appendChild(a);
      });

      block.appendChild(grid);
      wrapper.appendChild(block);
    });

    section.appendChild(wrapper);
  }

  // ── MOBILE ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  // ── PROTECTION ──
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  document.addEventListener('dragstart', function(e) { e.preventDefault(); });

  // ── KEYBOARD ──
  document.addEventListener('keydown', function(e) {
    if (slides.length === 0) return;
    if (e.key === 'ArrowRight') slideNav(1);
    if (e.key === 'ArrowLeft') slideNav(-1);
  });

  init();
</script>

</body>
</html>
