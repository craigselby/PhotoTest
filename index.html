<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craig Selby — CS Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#13131c;--gold:#c9a84c;--gold-l:#e8c96e;--white:#f0ede6;--muted:#888880;--border:rgba(201,168,76,0.15);--sidebar:270px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;display:flex;min-height:100vh;overflow-x:hidden}
/* only protect img inside gallery/slideshow not buttons */
.slideshow img,.cat-card img{pointer-events:none;user-select:none;-webkit-user-drag:none}
/* SIDEBAR */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar-brand{padding:2rem 1.5rem 1.5rem;border-bottom:1px solid var(--border)}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;color:var(--gold);letter-spacing:.05em;line-height:1.1;display:block;margin-bottom:.3rem}
.brand-sub{font-size:.62rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
.gold-rule{width:40px;height:1px;background:var(--gold);opacity:.4;margin:.8rem 0 0}
.nav-section{padding:1.4rem 1.5rem .4rem}
.nav-label{font-size:.6rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;display:block}
.nav-link{display:block;font-size:.8rem;font-weight:300;color:var(--muted);padding:.32rem 0;transition:color .2s,padding-left .2s;text-decoration:none;line-height:1.4}
.nav-link:hover{color:var(--white);padding-left:.4rem}
.sidebar-footer{margin-top:auto;padding:1.5rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.8rem}
.footer-link{font-size:.72rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);text-decoration:none;transition:color .2s}
.footer-link:hover{color:var(--white)}
.social-row{display:flex;gap:1rem}
.social-link{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.social-link:hover{color:var(--gold)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-y:auto}
/* SLIDESHOW */
.slideshow{position:relative;width:100%;height:80vh;min-height:400px;overflow:hidden;background:var(--bg)}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover;display:block}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,15,.75) 0%,rgba(10,10,15,.1) 50%,transparent 100%),linear-gradient(to right,rgba(10,10,15,.4) 0%,transparent 60%)}
.slide-content{position:absolute;bottom:3.5rem;left:3rem;z-index:2}
.slide-eyebrow{font-size:.62rem;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem;display:block;opacity:0;transform:translateY(10px);transition:opacity .6s .3s ease,transform .6s .3s ease}
.slide.active .slide-eyebrow{opacity:1;transform:translateY(0)}
.slide-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:300;line-height:1;color:var(--white);opacity:0;transform:translateY(15px);transition:opacity .7s .5s ease,transform .7s .5s ease}
.slide.active .slide-title{opacity:1;transform:translateY(0)}
.slide-sub{font-size:.78rem;font-weight:300;color:rgba(240,237,230,.7);margin-top:.5rem;letter-spacing:.05em;opacity:0;transform:translateY(10px);transition:opacity .6s .7s ease,transform .6s .7s ease}
.slide.active .slide-sub{opacity:1;transform:translateY(0)}
/* ARROWS - must NOT have pointer-events:none */
.slide-prev,.slide-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(10,10,15,.5);border:1px solid rgba(201,168,76,.4);color:var(--white);width:3rem;height:3rem;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .2s,border-color .2s;pointer-events:all}
.slide-prev:hover,.slide-next:hover{background:rgba(201,168,76,.25);border-color:var(--gold)}
.slide-prev{left:1.5rem}
.slide-next{right:1.5rem}
.slide-dots{position:absolute;bottom:1.5rem;right:2rem;display:flex;gap:.5rem;z-index:10}
.slide-dot{width:6px;height:6px;border-radius:50%;background:rgba(240,237,230,.3);cursor:pointer;border:none;padding:0;transition:background .3s,transform .3s;pointer-events:all}
.slide-dot.active{background:var(--gold);transform:scale(1.3)}
.slide-count{position:absolute;top:1.5rem;right:2rem;font-size:.65rem;font-weight:500;letter-spacing:.2em;color:rgba(240,237,230,.5);z-index:10}
.slideshow-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem}
.slideshow-placeholder h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:300;color:var(--white);text-align:center;line-height:1}
.slideshow-placeholder p{font-size:.8rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
/* INTRO STRIP */
.intro-strip{padding:2rem 3rem;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.intro-strip p{font-family:'Cormorant Garamond',serif;font-size:clamp(.95rem,1.5vw,1.1rem);font-style:italic;color:var(--muted);max-width:65ch;line-height:1.65}
.intro-strip p strong{color:var(--white);font-style:normal;font-weight:400}
.intro-cta{font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--bg);background:var(--gold);padding:.8rem 1.8rem;text-decoration:none;white-space:nowrap;transition:background .2s;flex-shrink:0}
.intro-cta:hover{background:var(--gold-l)}
/* CATEGORIES */
.categories-section{padding:3rem;flex:1}
.section-label{font-size:.6rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem;display:block}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:300;margin-bottom:2rem;color:var(--white);line-height:1.2}
.groups-wrapper{display:flex;flex-direction:column;gap:2.5rem}
.group-label{font-size:.6rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
.group-label::after{content:'';flex:1;height:1px;background:var(--border)}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.cat-card{background:var(--bg2);position:relative;overflow:hidden;cursor:pointer;text-decoration:none;display:block;aspect-ratio:4/3;transition:background .3s}
.cat-card:hover{background:#16161f}
.cat-card img{width:100%;height:100%;object-fit:cover;display:block;opacity:.6;transition:opacity .4s,transform .4s}
.cat-card:hover img{opacity:.8;transform:scale(1.05)}
.cat-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,15,.85) 0%,transparent 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.2rem}
.cat-card-label{font-size:.58rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
.cat-card-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--white);line-height:1.2}
.cat-card-count{font-size:.62rem;color:rgba(240,237,230,.5);margin-top:.3rem;letter-spacing:.05em}
.loading-msg{text-align:center;padding:5rem;font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--muted)}
/* MOBILE */
.mobile-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:200;background:var(--bg2);border:1px solid var(--border);color:var(--gold);padding:.5rem .9rem;font-size:.65rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif}
@media(max-width:900px){.categories-section{padding:2rem 1.5rem}.intro-strip{padding:1.5rem}}
@media(max-width:750px){.mobile-toggle{display:block}.sidebar{position:fixed;left:-100%;transition:left .3s ease;height:100vh;z-index:150}.sidebar.open{left:0}.slide-content{left:1.5rem;bottom:2.5rem}.slide-prev{left:.5rem}.slide-next{right:.5rem}.intro-strip{flex-direction:column;align-items:flex-start}.intro-cta{width:100%;text-align:center}}
</style>
</head>
<body>
<button class="mobile-toggle" onclick="toggleSidebar()">&#9776; Menu</button>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-name">Craig Selby</span>
    <span class="brand-sub">CS Photography</span>
    <div class="gold-rule"></div>
  </div>
  <nav id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="mailto:craig@craigselby.co.uk" class="footer-link">Contact</a>
    <div class="social-row">
      <a href="https://instagram.com/craigselby" class="social-link" target="_blank">Instagram</a>
      <a href="work-with-me.html" class="social-link">Work With Me</a>
    </div>
  </div>
</aside>
<main class="main">
  <div class="slideshow" id="slideshow">
    <p class="loading-msg" id="ssLoading">Loading...</p>
    <span class="slide-count" id="slideCount"></span>
    <button class="slide-prev" id="slidePrev" onclick="slideNav(-1)" style="display:none">&#8249;</button>
    <button class="slide-next" id="slideNext" onclick="slideNav(1)" style="display:none">&#8250;</button>
    <div class="slide-dots" id="slideDots"></div>
  </div>
  <div class="intro-strip">
    <p>Live music, wildlife, landscapes and sports photography from South Wales. <strong>Available for events, venues and collaborations.</strong></p>
    <a href="work-with-me.html" class="intro-cta">Work With Me</a>
  </div>
  <div class="categories-section" id="catsSection">
    <p class="loading-msg" id="catsLoading">Loading galleries...</p>
  </div>
</main>
<script>
var manifest={groups:[],images:[]};
var slides=[];
var cur=0;
var timer=null;

async function init(){
  try{
    var r=await fetch('images.json?v='+Date.now());
    manifest=await r.json();
    manifest.images=manifest.images||[];
    manifest.groups=manifest.groups||[];
  }catch(e){
    document.getElementById('ssLoading').textContent='Gallery unavailable.';
    document.getElementById('catsLoading').textContent='';
    return;
  }
  buildNav();
  buildSlideshow();
  buildCats();
}

function buildNav(){
  var nav=document.getElementById('sidebarNav');
  nav.innerHTML='';
  manifest.groups.forEach(function(g){
    var sec=document.createElement('div');
    sec.className='nav-section';
    var lbl=document.createElement('span');
    lbl.className='nav-label';
    lbl.textContent=g.label;
    sec.appendChild(lbl);
    g.categories.forEach(function(c){
      var a=document.createElement('a');
      a.className='nav-link';
      a.textContent=c.label;
      a.href='gallery.html?cat='+c.slug;
      sec.appendChild(a);
    });
    nav.appendChild(sec);
  });
}

function buildSlideshow(){
  var ss=document.getElementById('slideshow');
  var loading=document.getElementById('ssLoading');
  if(loading) loading.remove();

  slides=manifest.images.filter(function(i){return i.featured===true;});

  if(slides.length===0){
    ss.innerHTML='<div class="slideshow-placeholder"><h1>Craig Selby</h1><p>CS Photography &nbsp;&middot;&nbsp; Port Talbot, Wales</p></div>';
    return;
  }

  // show arrows and dots only when we have slides
  document.getElementById('slidePrev').style.display='flex';
  document.getElementById('slideNext').style.display='flex';

  // insert slides before arrows
  var prev=document.getElementById('slidePrev');
  slides.forEach(function(img,idx){
    var d=document.createElement('div');
    d.className='slide'+(idx===0?' active':'');
    var im=document.createElement('img');
    im.src=img.src;
    im.alt=img.title;
    if(idx>0) im.loading='lazy';
    var ov=document.createElement('div');
    ov.className='slide-overlay';
    var ct=document.createElement('div');
    ct.className='slide-content';
    ct.innerHTML='<span class="slide-eyebrow">'+img.categoryLabel+'</span><div class="slide-title">Craig Selby</div><div class="slide-sub">'+img.title+'</div>';
    d.appendChild(im);
    d.appendChild(ov);
    d.appendChild(ct);
    ss.insertBefore(d,prev);
  });

  // dots
  var dots=document.getElementById('slideDots');
  slides.forEach(function(_,idx){
    var dot=document.createElement('button');
    dot.className='slide-dot'+(idx===0?' active':'');
    dot.onclick=function(){goTo(idx);};
    dots.appendChild(dot);
  });

  updateCount();
  startTimer();
}

function goTo(idx){
  var sl=document.querySelectorAll('.slide');
  var dt=document.querySelectorAll('.slide-dot');
  if(sl[cur]) sl[cur].classList.remove('active');
  if(dt[cur]) dt[cur].classList.remove('active');
  cur=(idx+slides.length)%slides.length;
  if(sl[cur]) sl[cur].classList.add('active');
  if(dt[cur]) dt[cur].classList.add('active');
  updateCount();
  resetTimer();
}

function slideNav(dir){goTo(cur+dir);}

function updateCount(){
  var el=document.getElementById('slideCount');
  if(el&&slides.length>1) el.textContent=(cur+1)+' / '+slides.length;
}

function startTimer(){
  if(slides.length<=1) return;
  timer=setInterval(function(){goTo(cur+1);},5000);
}

function resetTimer(){clearInterval(timer);startTimer();}

function buildCats(){
  var sec=document.getElementById('catsSection');
  sec.innerHTML='';
  if(manifest.groups.length===0){
    sec.innerHTML='<p style="color:var(--muted);font-style:italic;text-align:center;padding:3rem">No galleries yet.</p>';
    return;
  }
  var lbl=document.createElement('span');
  lbl.className='section-label';
  lbl.textContent='Browse the work';
  sec.appendChild(lbl);
  var ttl=document.createElement('h2');
  ttl.className='section-title';
  ttl.textContent='Explore the galleries';
  sec.appendChild(ttl);
  var wrap=document.createElement('div');
  wrap.className='groups-wrapper';
  manifest.groups.forEach(function(g){
    var blk=document.createElement('div');
    blk.className='group-block';
    var glbl=document.createElement('div');
    glbl.className='group-label';
    glbl.textContent=g.label;
    blk.appendChild(glbl);
    var grid=document.createElement('div');
    grid.className='cat-grid';
    g.categories.forEach(function(c){
      var imgs=manifest.images.filter(function(i){return i.category===c.slug;});
      var cover=imgs.find(function(i){return i.featured;})||imgs[0];
      var a=document.createElement('a');
      a.className='cat-card';
      a.href='gallery.html?cat='+c.slug;
      if(cover){
        var im=document.createElement('img');
        im.src=cover.src;
        im.alt=c.label;
        im.loading='lazy';
        a.appendChild(im);
      }
      var ov=document.createElement('div');
      ov.className='cat-card-overlay';
      ov.innerHTML='<span class="cat-card-label">'+g.label+'</span><span class="cat-card-title">'+c.label+'</span><span class="cat-card-count">'+imgs.length+' photo'+(imgs.length!==1?'s':'')+'</span>';
      a.appendChild(ov);
      grid.appendChild(a);
    });
    blk.appendChild(grid);
    wrap.appendChild(blk);
  });
  sec.appendChild(wrap);
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

document.addEventListener('contextmenu',function(e){e.preventDefault();});
document.addEventListener('dragstart',function(e){e.preventDefault();});
document.addEventListener('keydown',function(e){
  if(slides.length===0) return;
  if(e.key==='ArrowRight') slideNav(1);
  if(e.key==='ArrowLeft') slideNav(-1);
});

init();
</script>
</body>
</html>
